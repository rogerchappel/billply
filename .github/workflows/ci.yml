name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Validate required project files
        run: |
          set -euo pipefail

          required_files=(
            README.md
            LICENSE
          )

          for file in "${required_files[@]}"; do
            test -s "$file"
          done

      - name: Validate markdown files are not empty
        run: |
          set -euo pipefail

          markdown_count=0

          while IFS= read -r -d '' file; do
            markdown_count=$((markdown_count + 1))
            test -s "$file"
          done < <(find . -type f -name '*.md' -not -path './.git/*' -print0)

          if [ "$markdown_count" -eq 0 ]; then
            echo "No markdown files found."
            exit 1
          fi

      - name: Install dependencies
        if: hashFiles('package.json') != ''
        run: pnpm install --frozen-lockfile

      - name: Run local validation
        if: hashFiles('scripts/validate.sh') != ''
        run: bash scripts/validate.sh

      - name: Run release check
        run: pnpm run release:check
